<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Message Sent — Nick Furr</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&family=Inter:wght@300;400&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root {
    --bg: #080608;
    --bg2: #100d0a;
    --amber: #e8830a;
    --teal: #00b896;
    --green: #2eb87a;
    --cream: #f5ede0;
    --fog: #c8b89a;
    --muted: #7a6a52;
    --line: rgba(200,180,140,0.12);
    --line-strong: rgba(232,131,10,0.22);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--cream);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #terrain-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .terrain-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
    background:
      radial-gradient(ellipse at center, transparent 40%, rgba(8,6,8,0.65) 100%),
      linear-gradient(to bottom, rgba(8,6,8,0.55) 0%, rgba(8,6,8,0.25) 40%, rgba(8,6,8,0.65) 100%);
  }
  .eng-grid {
    position: fixed; inset: 0; pointer-events: none; z-index: 2;
    background-image:
      linear-gradient(rgba(168,185,205,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(168,185,205,0.04) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .card {
    position: relative; z-index: 10;
    border: 1px solid var(--line);
    max-width: 480px;
    width: 90%;
    background: rgba(16,13,10,0.92);
    backdrop-filter: blur(20px);
  }
  .card-header {
    border-bottom: 1px solid var(--line);
    padding: 11px 20px;
    display: flex;
    justify-content: space-between;
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--teal);
    background: rgba(232,131,10,0.03);
  }
  .card-body { padding: 48px 40px; text-align: center; }
  .check { font-size: 44px; margin-bottom: 24px; display: block; color: var(--green); }
  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 52px;
    font-weight: 800;
    letter-spacing: -0.5px;
    text-transform: uppercase;
    line-height: 1;
    margin-bottom: 16px;
  }
  h1 span { color: var(--amber); }
  p { font-size: 14px; color: var(--fog); font-weight: 300; line-height: 1.7; margin-bottom: 28px; }
  .sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--teal); letter-spacing: 1.5px; margin-bottom: 32px; }
  a {
    display: inline-block;
    padding: 13px 32px;
    background: var(--amber);
    color: var(--bg);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
    transition: background 0.2s;
  }
  a:hover { background: #ffac30; }
</style>
</head>
<body>
<canvas id="terrain-canvas"></canvas>
<div class="terrain-overlay"></div>
<div class="eng-grid"></div>
<div class="card">
  <div class="card-header">
    <span>FORM NF-CONTACT</span>
    <span>STATUS: RECEIVED</span>
  </div>
  <div class="card-body">
    <span class="check">✓</span>
    <h1>MESSAGE<br/><span>RECEIVED</span></h1>
    <p>Thanks for reaching out. I'll review your project brief and get back to you within 24 hours.</p>
    <div class="sub">— N. FURR · BURLINGAME, CA</div>
    <a href="/">← Back to Site</a>
  </div>
</div>
<script>
(function() {
  const canvas = document.getElementById('terrain-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setClearColor(0x000000, 0);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.set(0, 3.2, 5.5);
  camera.lookAt(0, -0.5, 0);

  const W = 60, H = 60;
  const geometry = new THREE.PlaneGeometry(16, 16, W, H);
  geometry.rotateX(-Math.PI / 2);
  const positions = geometry.attributes.position;
  const count = positions.count;
  const baseHeights = new Float32Array(count);
  const phases = new Float32Array(count);
  const freqs = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const x = positions.getX(i), z = positions.getZ(i);
    baseHeights[i] = Math.sin(x*0.8+z*0.5)*0.5 + Math.sin(x*0.4-z*0.7)*0.7 + Math.cos(x*0.6+z*0.9)*0.4;
    phases[i] = Math.random() * Math.PI * 2;
    freqs[i] = 0.3 + Math.random() * 0.4;
  }
  const colors = new Float32Array(count * 3);
  const color = new THREE.Color();
  function updateColors(pos) {
    for (let i = 0; i < count; i++) {
      const norm = Math.max(0, Math.min(1, (pos.getY(i) + 2.0) / 4.0));
      if (norm < 0.25) { const t=norm/0.25; color.setRGB(0.07+t*0.71, 0.01+t*0.21, 0.01+t*0.04); }
      else if (norm < 0.5) { const t=(norm-0.25)/0.25; color.setRGB(0.78+t*0.13, 0.22+t*0.43, 0.04); }
      else if (norm < 0.75) { const t=(norm-0.5)/0.25; color.setRGB(0.91-t*0.86, 0.65+t*0.07, 0.04+t*0.24); }
      else { const t=(norm-0.75)/0.25; color.setRGB(0.05-t*0.05, 0.72+t*0.08, 0.28+t*0.37); }
      colors[i*3]=color.r; colors[i*3+1]=color.g; colors[i*3+2]=color.b;
    }
    geometry.attributes.color.needsUpdate = true;
  }
  geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  const mat = new THREE.MeshBasicMaterial({ vertexColors: true, wireframe: true, transparent: true, opacity: 0.7 });
  const sMat = new THREE.MeshBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.25, side: THREE.DoubleSide });
  const sGeom = geometry.clone();
  sGeom.setAttribute('color', new THREE.BufferAttribute(new Float32Array(count * 3), 3));
  scene.add(new THREE.Mesh(sGeom, sMat));
  scene.add(new THREE.Mesh(geometry, mat));
  function resize() { renderer.setSize(window.innerWidth, window.innerHeight); camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); }
  window.addEventListener('resize', resize); resize();
  let t = 0;
  (function animate() {
    requestAnimationFrame(animate);
    t += 0.004;
    const pos = geometry.attributes.position;
    const sPos = sGeom.attributes.position;
    for (let i = 0; i < count; i++) {
      const y = baseHeights[i] + Math.sin(t*freqs[i]+phases[i])*0.15;
      pos.setY(i,y); sPos.setY(i,y);
    }
    pos.needsUpdate = true; sPos.needsUpdate = true;
    updateColors(pos);
    const sc = sGeom.attributes.color;
    for (let i = 0; i < colors.length; i++) sc.array[i] = colors[i];
    sc.needsUpdate = true;
    camera.position.x = Math.sin(t*0.08)*0.3;
    camera.position.z = 5.5 + Math.sin(t*0.06)*0.2;
    camera.lookAt(0,-0.5,0);
    renderer.render(scene, camera);
  })();
})();
</script>
</body>
</html>
